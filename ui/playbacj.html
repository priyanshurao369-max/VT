<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#195de6",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<nav class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-16 items-center">
<div class="flex items-center gap-3">
<div class="bg-primary p-1.5 rounded-lg text-white">
<span class="material-symbols-outlined text-2xl">auto_stories</span>
</div>
<span class="text-xl font-bold tracking-tight">AudioReader</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">search</span>
</button>
<button class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</div>
</div>
</nav>
<main class="flex-1 max-w-4xl mx-auto w-full px-4 py-12 flex flex-col items-center">
<div class="w-full max-w-sm aspect-[3/4] rounded-2xl overflow-hidden shadow-2xl shadow-primary/20 mb-8 border border-slate-200 dark:border-slate-800">
<div class="w-full h-full bg-slate-200 dark:bg-slate-800 bg-cover bg-center" data-alt="Modern minimalist book cover art with deep blue accents" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAdgnvSICP4cp-0FQfdlpRd-u-YwvERmMsT62Wqzenegdnpv9sb0JU7pNFd0HvoLyCMsrNNKzJx5OncQqDFqte-n8PjZbIK4R89YkXF_VGI-d0lQshdysA-9UZrMOPupKgjKkgIJiMSKLDdr_iAXXoJCpTRK0cyObjwRgKA6l7xBtFqSPdc_dgQBfuqFrgYoQ5HeJPfkreUUcqpBj6ohWXbceFZwQi0aqxwJVRa2I4UsZi3o4pKMGSmcafAtmqgMjk6mdlrJ7fN7QU')">
</div>
</div>
<div class="text-center mb-10">
<h1 class="text-3xl font-bold mb-2">The Midnight Library</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg">Matt Haig • Narrated by Carey Mulligan</p>
</div>
<div class="w-full space-y-8 bg-white dark:bg-slate-900/50 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-500 dark:text-slate-400 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">record_voice_over</span>
                        Neural Voice Engine
                    </label>
<select class="custom-select w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl h-12 px-4 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 font-medium">
<option>Neural - English (US) - James</option>
<option selected="">Neural - English (UK) - Sophie</option>
<option>Neural - English (AU) - Matilda</option>
<option>Neural - French - Pierre</option>
</select>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-500 dark:text-slate-400 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">speed</span>
                        Playback Speed
                    </label>
<div class="flex gap-2">
<button class="flex-1 h-12 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-primary/10 hover:text-primary transition-colors font-bold">1.0x</button>
<button class="flex-1 h-12 rounded-xl bg-primary text-white font-bold">1.25x</button>
<button class="flex-1 h-12 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-primary/10 hover:text-primary transition-colors font-bold">1.5x</button>
</div>
</div>
</div>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 z-50 pb-8 px-4">
<div class="max-w-4xl mx-auto bg-white/90 dark:bg-slate-900/95 backdrop-blur-xl rounded-3xl border border-slate-200 dark:border-slate-800 shadow-2xl p-6">
<div class="flex flex-col gap-6">
<div class="space-y-2">
<div class="relative h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden cursor-pointer">
<div class="absolute top-0 left-0 h-full w-1/3 bg-primary rounded-full"></div>
<div class="absolute top-1/2 left-1/3 -translate-y-1/2 -translate-x-1/2 size-4 bg-primary border-4 border-white dark:border-slate-900 rounded-full shadow-lg"></div>
</div>
<div class="flex justify-between text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">
<span>42:15</span>
<span>-1:24:45</span>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="p-2 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">playlist_play</span>
</button>
<button class="p-2 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">timer</span>
</button>
</div>
<div class="flex items-center gap-2 sm:gap-6">
<button class="flex items-center justify-center size-10 rounded-full text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined !text-3xl">replay_10</span>
</button>
<button class="flex items-center justify-center size-10 rounded-full text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined !text-3xl font-fill">skip_previous</span>
</button>
<button class="flex items-center justify-center size-16 rounded-full bg-primary text-white shadow-xl shadow-primary/30 hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined !text-4xl">pause</span>
</button>
<button class="flex items-center justify-center size-10 rounded-full text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined !text-3xl">skip_next</span>
</button>
<button class="flex items-center justify-center size-10 rounded-full text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined !text-3xl">forward_30</span>
</button>
</div>
<div class="flex items-center gap-4">
<div class="hidden sm:flex items-center gap-2 group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary">volume_up</span>
<div class="w-24 h-1 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full w-3/4 bg-primary"></div>
</div>
</div>
<button class="p-2 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</div>
</div>
</div>
</footer>
<div class="h-40"></div>
</body></html>
